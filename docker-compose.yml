# Run ESCI reranker API. Mount model checkpoint at MODEL_PATH (default: ./checkpoints/multi_task_reranker).
services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/app/checkpoints/multi_task_reranker
    volumes:
      - ./checkpoints/multi_task_reranker:/app/checkpoints/multi_task_reranker:ro
