# Two-tower training on ESCI (relevant pairs only, in-batch negatives + self-adversarial reweighting)
data_dir: data
model_name: all-MiniLM-L12-v2
shared_tower: false
batch_size: 64
epochs: 3
lr: 2.0e-5
# loss_scale: 1.0   # set to 20–50 for grad_norm in 1–10 range (use smaller lr if you increase)
reweight_hard: true
hard_weight_power: 1.0
# Partial-query augmentation (head/tail truncations) so model sees shorter queries
use_query_augment: true
augment_prob: 0.5
save_path: data/model.pt
